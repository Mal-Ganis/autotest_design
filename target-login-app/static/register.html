<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>注册</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>注册</h1>
        <p class="sub">用户名 3–20 位（字母数字下划线）；密码 8–30 位且含大小写与数字</p>
        <div id="msg" class="msg"></div>
        <form id="form">
          <label for="username">用户名</label>
          <input id="username" name="username" autocomplete="username" required />
          <label for="email">邮箱</label>
          <input id="email" name="email" type="email" autocomplete="email" required />
          <label for="password">密码</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="new-password"
            required
          />
          <label for="confirm_password">确认密码</label>
          <input
            id="confirm_password"
            name="confirm_password"
            type="password"
            autocomplete="new-password"
            required
          />
          <button type="submit" class="btn">注册</button>
        </form>
        <div class="nav">已有账号？<a href="/login.html">登录</a></div>
      </div>
    </div>
    <script>
      const msgEl = document.getElementById("msg");
      function showMsg(text, ok) {
        msgEl.textContent = text;
        msgEl.className = "msg show " + (ok ? "ok" : "err");
      }
      document.getElementById("form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const body = {
          username: document.getElementById("username").value.trim(),
          email: document.getElementById("email").value.trim(),
          password: document.getElementById("password").value,
          confirm_password: document.getElementById("confirm_password").value,
        };
        const r = await fetch("/api/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify(body),
        });
        const j = await r.json();
        if (j.code === 0) {
          showMsg(j.message + " 用户ID：" + (j.data && j.data.user_id), true);
          setTimeout(() => (location.href = "/login.html"), 800);
        } else {
          showMsg(j.message, false);
        }
      });
    </script>
  </body>
</html>
